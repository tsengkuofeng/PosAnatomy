<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PosAnatomy - 雲端主控台</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video { transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: cover; opacity: 0.5; position: absolute; z-index: 1; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        #disclaimer-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px; box-sizing: border-box;
            backdrop-filter: blur(10px);
        }
        .modal-box {
            background: rgba(30, 30, 30, 0.8); border: 1px solid gold; border-radius: 15px; padding: 30px; max-width: 450px;
        }
        .modal-box h2 { color: gold; margin-top: 0; letter-spacing: 2px; }
        .modal-box p { font-size: 0.95rem; line-height: 1.6; color: #ddd; text-align: left;}

        #start-btn {
            background: gold; color: black; border: none; padding: 12px 30px; font-size: 1.1rem;
            border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s;
        }
        #qr-container { display: none; margin-top: 15px; }
        #qr-container img { border-radius: 10px; margin: 15px 0; border: 4px solid white; background: white; }
        #loading-text { color: gold; font-size: 1rem; margin-top: 10px; font-weight: bold; animation: pulse 1.5s infinite; }

        #controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none; background: rgba(20, 20, 20, 0.7); padding: 10px 20px; border-radius: 30px;
            z-index: 100; gap: 15px; border: 1px solid rgba(255,215,0,0.3);
            display: flex; align-items: center; justify-content: center; width: max-content;
        }
        .btn { background: transparent; color: white; border: 1px solid white; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .btn.active { background: white; color: black; }
        .btn-action { background: gold; color: black; border: none; font-weight: bold; }
        .btn-record.recording { background: red; color: white; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="disclaimer-modal">
        <div class="modal-box">
            <h2>PosAnatomy 雲端實驗室</h2>
            <div id="step-1">
                <p><b>GitHub 版使用說明：</b><br>
                • 透過 GitHub Pages 提供安全 HTTPS 連線。<br>
                • 無需安裝任何 App，掃碼即可實現無線動捕。<br>
                • 建議在光線充足環境下使用以獲得最佳準確度。</p>
                <button id="start-btn">同意並開啟連線</button>
            </div>

            <div id="qr-container">
                <p style="text-align:center; color:white; font-weight:bold;">📱 請用手機相機掃描下方條碼</p>
                <img id="qr-image" src="" alt="QR Code" width="200" height="200" />
                <p id="phone-url-text" style="font-size: 0.7rem; color: #888; word-break: break-all; margin-top:10px;"></p>
                <div id="loading-text">等待手機影像傳入...</div>
            </div>
        </div>
    </div>

    <div id="controls">
        <button class="btn active" id="toggle-bone">🦴 骨骼</button>
        <button class="btn active" id="toggle-muscle">🥩 肌肉</button>
        <button class="btn btn-action" id="btn-photo">📸 拍照</button>
        <button class="btn btn-action btn-record" id="btn-video">🎥 錄影</button>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <canvas id="merge-canvas" style="display:none;"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const modal = document.getElementById('disclaimer-modal');
        const step1 = document.getElementById('step-1');
        const qrContainer = document.getElementById('qr-container');
        const controls = document.getElementById('controls');
        const loadingText = document.getElementById('loading-text');

        let anatomyModel, showBone = true, showMuscle = true;
        let isRecording = false, mediaRecorder, recordedChunks = [];
        let pose, isPoseAnalyzing = false;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const pointLight = new THREE.PointLight(0xffaa00, 1);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);
        camera.position.z = 5;

        function loadModel() {
            const loader = new THREE.GLTFLoader();
            loader.load('my_anatomy.glb', (gltf) => {
                anatomyModel = gltf.scene;
                anatomyModel.traverse((child) => {
                    if (child.isMesh) {
                        child.material.transparent = true;
                        child.material.opacity = 0.7;
                        let name = child.name.toLowerCase();
                        child.userData.type = (name.includes('bone') || name.includes('skelet') || name.includes('spine')) ? 'bone' : 'muscle';
                    }
                });
                scene.add(anatomyModel);
            });
        }

        startBtn.addEventListener('click', () => {
            step1.style.display = 'none';
            qrContainer.style.display = 'block';
            loadModel();

            // 🌟 產生 Peer ID 並自動建構 GitHub Pages 網址
            const myPeerId = "posanatomy-" + Math.floor(Math.random() * 10000);
            const peer = new Peer(myPeerId);

            peer.on('open', (id) => {
                // 獲取目前目錄網址 (例如 https://user.github.io/repo/)
                const currentUrl = window.location.href.split('?')[0].split('#')[0];
                const cleanUrl = currentUrl.endsWith('/') ? currentUrl.slice(0, -1) : currentUrl;
                // 如果 index.html 在根目錄，手機端就是 cleanUrl + /phone.html
                const phoneUrl = `${cleanUrl}/phone.html?target_id=${id}`;

                document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(phoneUrl)}`;
                document.getElementById('phone-url-text').innerText = phoneUrl;
            });

            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (remoteStream) => {
                    videoElement.srcObject = remoteStream;
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        modal.style.display = 'none';
                        controls.style.display = 'flex';
                        initPoseAnalysis();
                    };
                });
            });
        });

        function initPoseAnalysis() {
            if (isPoseAnalyzing) return;
            isPoseAnalyzing = true;
            pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
            pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
            pose.onResults(onResults);

            async function step() {
                if (videoElement.readyState >= 2) await pose.send({image: videoElement});
                if (isPoseAnalyzing) requestAnimationFrame(step);
            }
            step();
        }

        function onResults(results) {
            if (!results.poseLandmarks || !anatomyModel) return;
            const left = results.poseLandmarks[11], right = results.poseLandmarks[12];
            anatomyModel.position.x = -((left.x + right.x) / 2 - 0.5) * 8;
            anatomyModel.position.y = -((left.y + right.y) / 2 - 0.5) * 6;
            const width = Math.sqrt(Math.pow(left.x - right.x, 2) + Math.pow(left.y - right.y, 2));
            anatomyModel.scale.set(width * 10, width * 10, width * 10);
            anatomyModel.rotation.z = Math.atan2(left.y - right.y, left.x - right.x);
        }

        document.getElementById('toggle-bone').addEventListener('click', function() {
            showBone = !showBone; this.classList.toggle('active'); updateVis();
        });
        document.getElementById('toggle-muscle').addEventListener('click', function() {
            showMuscle = !showMuscle; this.classList.toggle('active'); updateVis();
        });

        function updateVis() {
            if(!anatomyModel) return;
            anatomyModel.traverse((child) => {
                if(child.isMesh) {
                    if(child.userData.type === 'bone') child.visible = showBone;
                    if(child.userData.type === 'muscle') child.visible = showMuscle;
                }
            });
        }

        const mergeCanvas = document.getElementById('merge-canvas');
        const ctx = mergeCanvas.getContext('2d');
        function drawMergedFrame() {
            mergeCanvas.width = videoElement.videoWidth || 1280;
            mergeCanvas.height = videoElement.videoHeight || 720;
            ctx.save(); ctx.scale(-1, 1);
            ctx.drawImage(videoElement, -mergeCanvas.width, 0, mergeCanvas.width, mergeCanvas.height);
            ctx.restore();
            ctx.drawImage(renderer.domElement, 0, 0, mergeCanvas.width, mergeCanvas.height);
        }

        document.getElementById('btn-photo').addEventListener('click', () => {
            drawMergedFrame();
            const link = document.createElement('a');
            link.download = 'PosAnatomy_Capture.png';
            link.href = mergeCanvas.toDataURL('image/png');
            link.click();
        });

        document.getElementById('btn-video').addEventListener('click', function() {
            if (!isRecording) {
                const stream = mergeCanvas.captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                recordedChunks = [];
                mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = 'PosAnatomy_Video.webm'; a.click();
                };
                mediaRecorder.start(); isRecording = true;
                this.innerText = "🛑 停止"; this.classList.add('recording');
            } else {
                mediaRecorder.stop(); isRecording = false;
                this.innerText = "🎥 錄影"; this.classList.remove('recording');
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
            if (isRecording) drawMergedFrame();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
