<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PosAnatomy - 手機 AR 透視鏡</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }

        /* 1. 最底層：鏡頭畫面 */
        #video { width: 100vw; height: 100vh; object-fit: cover; position: absolute; z-index: 1; top: 0; left: 0; }

        /* 2. 中間層：AI 節點畫布 */
        #output_canvas { width: 100vw; height: 100vh; object-fit: cover; position: absolute; z-index: 2; top: 0; left: 0; pointer-events: none; }

        /* 3. 最上層：3D 模型畫布 */
        #three_canvas { position: absolute; top: 0; left: 0; z-index: 3; pointer-events: none; }

        #start-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px); }
        .modal-box { background: rgba(30, 30, 30, 0.9); border: 1px solid gold; border-radius: 15px; padding: 30px; width: 85%; max-width: 400px; }
        .modal-box h2 { color: gold; margin-top: 0; }
        .modal-box p { font-size: 0.9rem; line-height: 1.5; color: #ccc; text-align: left; }
        #start-btn { background: gold; color: black; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
        #loading-text { display: none; color: gold; font-weight: bold; margin-top: 15px; animation: pulse 1s infinite; }
        #controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 25px; z-index: 100; gap: 10px; border: 1px solid rgba(255,215,0,0.4); backdrop-filter: blur(5px); display: flex; flex-wrap: wrap; justify-content: center; width: 90%; max-width: 350px; }
        .btn { background: transparent; color: white; border: 1px solid white; padding: 10px 15px; border-radius: 20px; font-size: 0.9rem; transition: 0.3s; pointer-events: auto; }
        .btn.active { background: white; color: black; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="modal-box">
            <h2>📱 AR 解剖透視鏡</h2>
            <p>1. 允許相機權限。<br>2. 對準全身，保持光線明亮。<br>⚠️ <i>初次載入需等候 10-20 秒。</i></p>
            <button id="start-btn">開啟相機與載入模型</button>
            <div id="loading-text">資源載入中，請稍候...</div>
        </div>
    </div>

    <div id="controls">
        <button class="btn active" id="toggle-bone">🦴 骨骼</button>
        <button class="btn active" id="toggle-muscle">🥩 肌肉</button>
        <button class="btn active" id="toggle-nerve">⚡ 神經</button>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const controls = document.getElementById('controls');
        const loadingText = document.getElementById('loading-text');

        const models = { bone: null, muscle: null, nerve: null };
        let showBone = true, showMuscle = true, showNerve = true;
        let pose, isPoseAnalyzing = false;

        // --- Three.js 初始化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.domElement.id = 'three_canvas';
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff0dd, 1);
        dirLight.position.set(0, 5, 5);
        scene.add(dirLight);

        camera.position.z = 5;
        const anatomyGroup = new THREE.Group();
        scene.add(anatomyGroup);

        // --- 載入模型 ---
        function loadModels() {
            const loader = new THREE.GLTFLoader();
            const dracoLoader = new THREE.DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
            loader.setDRACOLoader(dracoLoader);

            let loadedCount = 0;
            const parts = ['bone', 'muscle', 'nerve'];

            parts.forEach(part => {
                loader.load(`./${part}.glb`, (gltf) => {
                    models[part] = gltf.scene;
                    anatomyGroup.add(models[part]);
                    loadedCount++;
                    if(loadedCount === 3) {
                        loadingText.innerText = "模型載入完成！啟動相機中...";
                        startCamera();
                    }
                });
            });
        }

        // --- 開啟後置相機 ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    // 設定畫布解析度與影片一致
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                    startScreen.style.display = 'none';
                    controls.style.display = 'flex';
                    initPoseAnalysis();
                };
            } catch (err) { alert("相機開啟失敗！"); }
        }

        // --- MediaPipe 初始化 ---
        function initPoseAnalysis() {
            if (isPoseAnalyzing) return;
            isPoseAnalyzing = true;
            pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
            pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
            pose.onResults(onResults);

            async function step() {
                if (videoElement.readyState >= 2) await pose.send({image: videoElement});
                if (isPoseAnalyzing) requestAnimationFrame(step);
            }
            step();
        }

        // --- 核心對位與繪製 ---
        function onResults(results) {
            // 1. 繪製 MediaPipe 節點到畫布上
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                // 畫出綠色骨架連線與紅色節點
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2, radius: 3});

                anatomyGroup.visible = true;

                // 2. 移動 3D 模型立牌
                const landmarks = results.poseLandmarks;
                const leftShoulder = landmarks[11];
                const rightShoulder = landmarks[12];

                const midX = (leftShoulder.x + rightShoulder.x) / 2;
                const midY = (leftShoulder.y + rightShoulder.y) / 2;

                const screenAspect = window.innerHeight / window.innerWidth;
                anatomyGroup.position.x = (midX - 0.5) * 8;
                anatomyGroup.position.y = -(midY - 0.5) * 8 * screenAspect;

                const shoulderWidth = Math.sqrt(Math.pow(leftShoulder.x - rightShoulder.x, 2) + Math.pow(leftShoulder.y - rightShoulder.y, 2));
                const scaleFactor = shoulderWidth * 9.5;
                anatomyGroup.scale.set(scaleFactor, scaleFactor, scaleFactor);

                const angle = Math.atan2(rightShoulder.y - leftShoulder.y, rightShoulder.x - leftShoulder.x);
                anatomyGroup.rotation.z = -angle;
            } else {
                anatomyGroup.visible = false;
            }
            canvasCtx.restore();
        }

        // --- UI 控制 ---
        ['bone', 'muscle', 'nerve'].forEach(part => {
            document.getElementById(`toggle-${part}`).addEventListener('click', function() {
                this.classList.toggle('active');
                if (part === 'bone') { showBone = !showBone; if(models.bone) models.bone.visible = showBone; }
                if (part === 'muscle') { showMuscle = !showMuscle; if(models.muscle) models.muscle.visible = showMuscle; }
                if (part === 'nerve') { showNerve = !showNerve; if(models.nerve) models.nerve.visible = showNerve; }
            });
        });

        startBtn.addEventListener('click', () => { startBtn.style.display = 'none'; loadingText.style.display = 'block'; loadModels(); });

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
