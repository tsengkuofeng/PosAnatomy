<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PosAnatomy - 手機 AR 透視鏡</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        /* 鏡頭畫面：滿版、不翻轉 (因為是後置鏡頭) */
        #video { width: 100vw; height: 100vh; object-fit: cover; position: absolute; z-index: 1; top: 0; left: 0; }
        /* 3D 畫布：疊在鏡頭上方，允許穿透點擊 */
        canvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px; box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        .modal-box { background: rgba(30, 30, 30, 0.9); border: 1px solid gold; border-radius: 15px; padding: 30px; width: 85%; max-width: 400px; }
        .modal-box h2 { color: gold; margin-top: 0; }
        .modal-box p { font-size: 0.9rem; line-height: 1.5; color: #ccc; text-align: left; }

        #start-btn {
            background: gold; color: black; border: none; padding: 15px 30px; font-size: 1.1rem;
            border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%;
        }

        #loading-text { display: none; color: gold; font-weight: bold; margin-top: 15px; animation: pulse 1s infinite; }

        /* 手機版底部控制列 */
        #controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none; background: rgba(0, 0, 0, 0.6); padding: 12px; border-radius: 25px;
            z-index: 100; gap: 10px; border: 1px solid rgba(255,215,0,0.4);
            backdrop-filter: blur(5px); display: flex; flex-wrap: wrap; justify-content: center; width: 90%; max-width: 350px;
        }
        .btn { background: transparent; color: white; border: 1px solid white; padding: 10px 15px; border-radius: 20px; font-size: 0.9rem; transition: 0.3s; pointer-events: auto; }
        .btn.active { background: white; color: black; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="modal-box">
            <h2>📱 AR 解剖透視鏡</h2>
            <p>1. 請允許瀏覽器使用相機權限。<br>
               2. 使用<b>後置鏡頭</b>對準目標人物。<br>
               3. 保持全身入鏡，光線明亮。<br>
               ⚠️ <i>初次載入模型需約 10-20 秒，請耐心等候。</i></p>
            <button id="start-btn">開啟相機與載入模型</button>
            <div id="loading-text">資源載入中，請稍候...</div>
        </div>
    </div>

    <div id="controls" style="display: none;">
        <button class="btn active" id="toggle-bone">🦴 骨骼</button>
        <button class="btn active" id="toggle-muscle">🥩 肌肉</button>
        <button class="btn active" id="toggle-nerve">⚡ 神經</button>
    </div>

    <video id="video" playsinline autoplay muted></video>

    <script>
        const videoElement = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const controls = document.getElementById('controls');
        const loadingText = document.getElementById('loading-text');

        const models = { bone: null, muscle: null, nerve: null };
        let showBone = true, showMuscle = true, showNerve = true;
        let pose, isPoseAnalyzing = false;

        // --- Three.js 初始化 ---
        const scene = new THREE.Scene();
        // 為了讓 AR 疊加更準確，我們根據手機螢幕比例設定相機
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff0dd, 1);
        dirLight.position.set(0, 5, 5);
        scene.add(dirLight);

        camera.position.z = 5;

        const anatomyGroup = new THREE.Group();
        scene.add(anatomyGroup);

        // --- 載入模型 ---
        function loadModels() {
            const loader = new THREE.GLTFLoader();
            const dracoLoader = new THREE.DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
            loader.setDRACOLoader(dracoLoader);

            let loadedCount = 0;
            const parts = ['bone', 'muscle', 'nerve'];

            parts.forEach(part => {
                loader.load(`./${part}.glb`, (gltf) => {
                    const model = gltf.scene;
                    models[part] = model;
                    anatomyGroup.add(model);
                    loadedCount++;

                    if(loadedCount === 3) {
                        // 模型全數載入完畢，開啟相機
                        loadingText.innerText = "模型載入完成！啟動相機中...";
                        startCamera();
                    }
                }, undefined, (error) => {
                    console.error(`載入 ${part}.glb 失敗:`, error);
                    loadingText.innerText = `❌ 載入 ${part} 失敗`;
                    loadingText.style.color = "red";
                });
            });
        }

        // --- 開啟後置相機 ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoElement.srcObject = stream;

                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    startScreen.style.display = 'none';
                    controls.style.display = 'flex';
                    initPoseAnalysis(); // 開始 AI 辨識
                };
            } catch (err) {
                alert("相機開啟失敗，請確認已給予權限！");
                console.error(err);
            }
        }

        // --- MediaPipe 初始化 ---
        function initPoseAnalysis() {
            if (isPoseAnalyzing) return;
            isPoseAnalyzing = true;
            pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });

            // 手機版效能考量，Complexity 設為 0 或 1
            pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
            pose.onResults(onResults);

            async function step() {
                if (videoElement.readyState >= 2) {
                    await pose.send({image: videoElement});
                }
                if (isPoseAnalyzing) requestAnimationFrame(step);
            }
            step();
        }

        // --- 核心對位邏輯 (AR 追蹤) ---
        function onResults(results) {
            if (!results.poseLandmarks || anatomyGroup.children.length === 0) {
                anatomyGroup.visible = false; // 沒抓到人就隱藏模型
                return;
            }
            anatomyGroup.visible = true;

            const landmarks = results.poseLandmarks;
            // 11 = 左肩, 12 = 右肩 (以畫面方向來看)
            const leftShoulder = landmarks[11];
            const rightShoulder = landmarks[12];

            // 1. 計算中心點
            const midX = (leftShoulder.x + rightShoulder.x) / 2;
            const midY = (leftShoulder.y + rightShoulder.y) / 2;

            // 2. 將 MediaPipe 座標 (0~1) 轉換為 Three.js 空間座標
            // 這裡的乘數 (8, 6 等) 需根據你的模型原始大小做微調
            const screenAspect = window.innerHeight / window.innerWidth;
            anatomyGroup.position.x = (midX - 0.5) * 8;
            anatomyGroup.position.y = -(midY - 0.5) * 8 * screenAspect;

            // 3. 計算肩膀寬度來決定縮放比例
            const shoulderWidth = Math.sqrt(Math.pow(leftShoulder.x - rightShoulder.x, 2) + Math.pow(leftShoulder.y - rightShoulder.y, 2));
            const scaleFactor = shoulderWidth * 9.5; // 這裡的 9.5 是放大倍率，可自行微調
            anatomyGroup.scale.set(scaleFactor, scaleFactor, scaleFactor);

            // 4. 計算身體傾斜角度
            const angle = Math.atan2(rightShoulder.y - leftShoulder.y, rightShoulder.x - leftShoulder.x);
            anatomyGroup.rotation.z = -angle;
        }

        // --- 按鈕事件綁定 ---
        document.getElementById('toggle-bone').addEventListener('click', function() {
            showBone = !showBone; this.classList.toggle('active');
            if(models.bone) models.bone.visible = showBone;
        });
        document.getElementById('toggle-muscle').addEventListener('click', function() {
            showMuscle = !showMuscle; this.classList.toggle('active');
            if(models.muscle) models.muscle.visible = showMuscle;
        });
        document.getElementById('toggle-nerve').addEventListener('click', function() {
            showNerve = !showNerve; this.classList.toggle('active');
            if(models.nerve) models.nerve.visible = showNerve;
        });

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            loadingText.style.display = 'block';
            loadModels();
        });

        // --- 渲染迴圈 ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // --- 視窗縮放處理 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
