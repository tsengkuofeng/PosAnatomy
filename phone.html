<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PosAnatomy - 手機鏡頭端</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        /* 移除鏡像翻轉，因為使用的是後置鏡頭，翻轉會讓畫面左右不分 */
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 20px; object-fit: cover; }
        .status { padding: 12px; background: #333; border-radius: 8px; margin-top: 20px; color: gold; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
    <h2>📱 動作擷取鏡頭</h2>
    <p style="color:#aaa; font-size: 0.9rem;">請將手機架好，讓鏡頭拍到您的全身</p>
    <div class="status" id="status">正在開啟相機...</div>
    <video id="localVideo" autoplay playsinline muted></video>

    <script>
        const statusEl = document.getElementById('status');
        const videoEl = document.getElementById('localVideo');

        // 取得網址列上的 target_id (電腦的 ID)
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('target_id');

        if (!targetId) {
            statusEl.innerText = "❌ 錯誤：無目標 ID，請重新從電腦掃描 QR Code";
            statusEl.style.color = "red";
        } else {
            const peer = new Peer(); // 隨機生成自己的 ID

            peer.on('open', async (id) => {
                try {
                    // 開啟相機 (使用後置鏡頭，解析度設為 640x480，並設定 30fps 以兼顧畫質與低延遲追蹤)
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 640 },
                            height: { ideal: 480 },
                            frameRate: { ideal: 30 }
                        },
                        audio: false
                    });

                    videoEl.srcObject = stream;

                    // 確保在 iOS Safari 上能順利自動播放
                    videoEl.onloadedmetadata = () => {
                        videoEl.play().catch(e => console.error("播放失敗:", e));
                    };

                    statusEl.innerText = "相機已啟動，正在連線至電腦...";

                    // 撥號給電腦並傳送影像
                    const call = peer.call(targetId, stream);

                    // 因為電腦端只接收不回傳影像，所以我們直接顯示傳輸中
                    statusEl.innerText = "✅ 影像傳輸中！請看電腦螢幕";
                    statusEl.style.color = "lime";

                    // 監聽連線中斷
                    call.on('close', () => {
                        statusEl.innerText = "❌ 已與電腦斷開連線";
                        statusEl.style.color = "red";
                    });

                } catch (err) {
                    statusEl.innerText = "❌ 相機啟動失敗";
                    statusEl.style.color = "red";

                    // 防呆提示
                    if (err.name === 'NotAllowedError') {
                        alert("請允許瀏覽器使用相機權限！");
                    } else if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                        alert("安全性錯誤：手機必須透過 HTTPS 連線才能使用相機。請確認伺服器憑證設定。");
                    } else {
                        alert("發生未知的錯誤：" + err.message);
                    }
                    console.error(err);
                }
            });

            // 監聽 PeerJS 本身的錯誤
            peer.on('error', (err) => {
                statusEl.innerText = "❌ 連線發生錯誤";
                statusEl.style.color = "red";
                console.error(err);
            });
        }
    </script>
</body>
</html>
